<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://example.com">
  <title>Claro Running | Redirecionando</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #101820;
      background: #f4f7f8;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 520px);
      border: 1px solid #dfe5e9;
      border-radius: 8px;
      background: white;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(16, 24, 32, .08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0 0 18px;
      color: #65717d;
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      border-radius: 8px;
      background: #df1f2d;
      color: white;
      padding: 0 16px;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
  <script>
    window.location.replace("https://example.com");
  </script>
</head>
<body>
  <main>
    <h1>CR</h1>
    <p>Estamos abrindo o check-in facial. Se o redirecionamento nao acontecer automaticamente, toque no botao abaixo.</p>
    <a href="https://example.com">Abrir check-in facial</a>
  </main>
</body>
</html>
